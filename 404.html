<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <script>
        // Theme initialization to prevent flicker
        (function () {
            const savedTheme = localStorage.getItem('qrm-theme') || 'dark';
            if (savedTheme === 'system') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme-mode', 'system');
            } else {
                document.documentElement.setAttribute('data-theme', savedTheme);
                document.documentElement.removeAttribute('data-theme-mode');
            }
        })();
    </script>
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>404 — Page Not Found | QR Maker</title>
    <meta name="description" content="The page you are looking for does not exist. Back to QR Maker.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />

    <!-- Root Styles -->
    <link rel="stylesheet" href="/css/style.css">

    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            height: auto !important;
            width: auto !important;
            overflow: auto !important;
            display: flex;
            flex-direction: column;
        }

        /* Error layout */
        .error-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
            margin-top: 60px;
        }

        .error-card {
            max-width: 500px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            box-shadow: var(--shadow-lg);
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.05em;
            margin: 0;
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0;
        }

        .error-desc {
            color: var(--text-subtle);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            width: 100%;
            margin-top: 0.5rem;
        }

        .btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: var(--radius-sm);
            text-decoration: none;
            transition: background-color 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .btn.primary {
            background-color: var(--accent);
            color: #121214;
        }

        .btn.primary:hover {
            background-color: var(--accent-hover);
        }

        .btn.secondary {
            background-color: var(--control-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn.secondary:hover {
            background-color: var(--control-bg-hover);
        }

        @media (max-width: 640px) {
            .header-nav {
                display: none;
            }
            .error-card {
                padding: 2rem 1.5rem;
                border: none;
                background: transparent;
                box-shadow: none;
            }
            .error-code {
                font-size: 5rem;
            }
            .error-actions {
                flex-direction: column;
                gap: 0.75rem;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="global-header">
        <div class="header-left">
            <a href="/" class="logo-link">
                <span class="logo-text">QR Maker</span>
                <span class="badge">404</span>
            </a>
        </div>
        <div class="header-right">
            <nav class="header-nav" aria-label="Main Navigation">
                <a href="/" class="nav-link">App</a>
                <a href="/about/" class="nav-link">About</a>
                <a href="/api/" class="nav-link">API</a>
            </nav>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="system-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
                <span id="theme-status" class="theme-status"></span>
            </button>
            <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
                <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                <svg class="close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </header>

    <!-- Mobile Navigation Overlay -->
    <div id="mobile-nav-menu" class="mobile-nav-menu">
        <nav class="mobile-menu-nav">
            <a href="/" class="mobile-menu-link">App</a>
            <a href="/about/" class="mobile-menu-link">About</a>
            <a href="/api/" class="mobile-menu-link">API</a>
        </nav>
    </div>

    <!-- Error Container -->
    <main class="error-container">
        <div class="error-card">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-desc">
                The page you're looking for doesn't exist, was moved, or has a broken link.
            </p>
            <div class="error-actions">
                <a href="/" class="btn primary">Back to App</a>
                <a href="/api/" class="btn secondary">Explore API</a>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/js/header.js" defer></script>
</body>

</html>
