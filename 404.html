<!DOCTYPE html>
<html lang="en" translate="no">

<head>
    <meta charset="UTF-8">
    <script>
        // Theme initialization to prevent flicker
        (function () {
            const savedTheme = localStorage.getItem('qrm-theme') || 'dark';
            if (savedTheme === 'system') {
                const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme-mode', 'system');
            } else {
                document.documentElement.setAttribute('data-theme', savedTheme);
                document.documentElement.removeAttribute('data-theme-mode');
            }
        })();
    </script>
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>404 — Page Not Found | QR Maker</title>
    <meta name="description" content="The page you are looking for does not exist. Back to QR Maker.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png?v=2" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg?v=2" />

    <!-- Root Styles -->
    <link rel="stylesheet" href="/css/style.css">

    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            height: auto !important;
            width: auto !important;
            overflow: auto !important;
            display: flex;
            flex-direction: column;
        }

        /* Error layout */
        .error-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
            margin-top: 60px;
        }

        .error-card {
            max-width: 500px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            box-shadow: var(--shadow-lg);
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.05em;
            margin: 0;
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0;
        }

        .error-desc {
            color: var(--text-subtle);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            width: 100%;
            margin-top: 0.5rem;
        }

        .btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: var(--radius-sm);
            text-decoration: none;
            transition: background-color 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .btn.primary {
            background-color: var(--accent);
            color: #121214;
        }

        .btn.primary:hover {
            background-color: var(--accent-hover);
        }

        .btn.secondary {
            background-color: var(--control-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn.secondary:hover {
            background-color: var(--control-bg-hover);
        }

        @media (max-width: 640px) {
            .header-nav {
                display: none;
            }

            .error-card {
                padding: 2rem 1.5rem;
                border: none;
                background: transparent;
                box-shadow: none;
            }

            .error-code {
                font-size: 5rem;
            }

            .error-actions {
                flex-direction: column;
                gap: 0.75rem;
            }
        }
    </style>
</head>

<body>
    <global-header show-badge="404"></global-header>

    <!-- Error Container -->
    <main class="error-container">
        <div class="error-card">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-desc">
                The page you're looking for doesn't exist, was moved, or has a broken link.
            </p>
            <div class="error-actions">
                <a href="/" class="btn primary">Back to App</a>
                <a href="/api/" class="btn secondary">Explore API</a>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="/js/header.js"></script>
</body>

</html>
